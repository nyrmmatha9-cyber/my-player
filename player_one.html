<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Player Spotify-like</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
    .player { height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #1db954, #191414); }
    .cover { width: 300px; height: 300px; object-fit: cover; margin: 20px auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .track-info { text-align: center; margin: 20px; }
    .title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
    .artist { font-size: 16px; color: #b3b3b3; }
    .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 40px 0; }
    button { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 10px; }
    button:hover { color: #1db954; }
    .play-btn { font-size: 40px; }
    .playlist { list-style: none; overflow-y: auto; flex: 1; padding: 20px; }
    .track { display: flex; align-items: center; padding: 15px; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
    .track:hover { background: rgba(255,255,255,0.1); }
    .track.active { background: rgba(29,185,84,0.3); }
    .track-info-small { flex: 1; margin-left: 15px; }
    audio { display: none; }
    @media (max-width: 768px) { .cover { width: 200px; height: 200px; } }
  </style>
</head>
<body>
  <div class="player">
    <img id="cover" class="cover" src="https://via.placeholder.com/300/1db954/000?text=Capa" alt="Capa">
    <div class="track-info">
      <div id="title" class="title">Selecione uma faixa</div>
      <div id="artist" class="artist">Artista</div>
    </div>
    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play" class="play-btn">▶</button>
      <button id="next">⏭</button>
    </div>
    <audio id="audio" preload="metadata"></audio>
    <ul id="playlist" class="playlist"></ul>
  </div>
  <script>
    const PLAYLIST = [  // ← EDITE AQUI COM SEUS ARQUIVOS
      {
        title: "Sua Música 1",
        artist: "Artista 1",
        src: "https://drive.google.com/uc?export=download&id=SEU_ID_MP3_1",  // Ou /file/d/ID/preview se CORS
        cover: "https://drive.google.com/uc?id=SEU_ID_CAPA_1"
      },
      // Adicione mais: { title: "...", artist: "...", src: "...", cover: "..." },
    ];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const cover = document.getElementById('cover');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const playlistEl = document.getElementById('playlist');
    let currentIndex = 0;

    function loadTrack(index) {
      const track = PLAYLIST[index];
      audio.src = track.src;
      title.textContent = track.title;
      artist.textContent = track.artist;
      cover.src = track.cover || 'https://via.placeholder.com/300/1db954/000?text=Capa';
      updateActiveTrack(index);
      audio.load();
    }

    function updateActiveTrack(index) {
      document.querySelectorAll('.track').forEach((el, i) => el.classList.toggle('active', i === index));
    }

    // Render playlist
    PLAYLIST.forEach((track, index) => {
      const li = document.createElement('li');
      li.className = 'track';
      li.innerHTML = `<img src="${track.cover || 'https://via.placeholder.com/50/1db954/000'}" style="width:50px;height:50px;border-radius:4px;"><div class="track-info-small"><div>${track.title}</div><div style="font-size:12px;color:#b3b3b3;">${track.artist}</div></div>`;
      li.addEventListener('click', () => loadTrack(index));
      playlistEl.appendChild(li);
    });

    playBtn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; } else { audio.pause(); playBtn.textContent = '▶'; }
    });
    prevBtn.addEventListener('click', () => loadTrack((currentIndex = (currentIndex - 1 + PLAYLIST.length) % PLAYLIST.length)));
    nextBtn.addEventListener('click', () => loadTrack((currentIndex = (currentIndex + 1) % PLAYLIST.length)));
    audio.addEventListener('ended', () => nextBtn.click());

    // Teclas: Espaço play/pause, setas next/prev
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
      if (e.code === 'ArrowRight') nextBtn.click();
      if (e.code === 'ArrowLeft') prevBtn.click();
    });

    loadTrack(0);
  </script>
</body>
</html>
